<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Profile</title>
  <link href="../dist/output.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  <!-- Navigation -->
  <header class="bg-white shadow-md">
    <div class="text-5xl text-green-600 font-bold">TAIIND TEST</div>

    <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold">User Profile</h1>
      <a href="/feed" class="text-blue-600 hover:underline">Back to Feed</a>
    </div>
  </header>

  <!-- Profile Content -->
  <main class="flex-grow max-w-5xl mx-auto px-4 py-8">
    <!-- Profile Info -->
    <section class="bg-white p-6 rounded-xl shadow-md flex flex-col items-center text-center mb-8">
      <img 
        src="https://placehold.co/120x120
        " 
        alt="Profile Image" 
        class="w-28 h-28 rounded-full mb-4"
      />
      <h2 class="text-2xl font-bold mb-2">Username123</h2>
      <button 
        class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 transition duration-200"
      >
        Follow
      </button>
    </section>

    <!-- Followers / Following -->
    <section class="flex justify-around mb-8">
      <div class="text-center">
        <p class="text-lg font-bold">120</p>
        <p class="text-gray-600">Followers</p>
      </div>
      <div class="text-center">
        <p class="text-lg font-bold">85</p>
        <p class="text-gray-600">Following</p>
      </div>
    </section>

    <!-- User Posts -->
    <section>
      <h3 class="text-xl font-bold mb-4">My Posts</h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Example Post -->
        <article class="bg-white p-4 rounded-xl shadow-md">
          <img src="https://placehold.co/400x200
          " alt="Post Thumbnail" class="rounded-md mb-4">
          <h4 class="text-lg font-bold mb-2">Post Title 1</h4>
          <p class="text-sm text-gray-700 mb-4">A short preview of the post content goes here.</p>
          <button class="text-blue-600 hover:underline">Read more</button>
        </article>

        <article class="bg-white p-4 rounded-xl shadow-md">
          <img src="https://placehold.co/400x200
          " alt="Post Thumbnail" class="rounded-md mb-4">
          <h4 class="text-lg font-bold mb-2">Post Title 2</h4>
          <p class="text-sm text-gray-700 mb-4">Another preview of the post content.</p>
          <button class="text-blue-600 hover:underline">Read more</button>
        </article>
      </div>
    </section>
  </main>
</body>
</html>

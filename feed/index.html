<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feed</title>
  <link href="../dist/output.css" rel="stylesheet" />
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 text-gray-800 font-sans">
    <!-- Navigation -->
  <header class="bg-black shadow-md">
    <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold">Social Media Feed</h1>
      <a href="/profile" class="text-blue-600 hover:underline">My Profile</a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow max-w-5xl mx-auto px-4 py-6">
    <!-- Search and Sort -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-4">
      <input 
        type="search" 
        placeholder="Search posts..." 
        class="w-full md:w-1/2 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <select class="px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option>Sort by date</option>
        <option>Sort by likes</option>
        <option>Sort by comments</option>
      </select>
    </div>

    <!-- New Post Form -->
    <section class="bg-white p-6 rounded-xl shadow-md mb-8">
      <h2 class="text-lg font-bold mb-4">Create a New Post</h2>
      <form action="#" method="POST" class="space-y-4">
        <div>
          <label for="title" class="block text-sm font-medium text-gray-700">Post Title</label>
          <input 
            id="title" 
            name="title" 
            type="text" 
            required 
            class="mt-1 w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label for="content" class="block text-sm font-medium text-gray-700">Content</label>
          <textarea 
            id="content" 
            name="content" 
            rows="3" 
            required 
            class="mt-1 w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          ></textarea>
        </div>
        <button 
          type="submit" 
          class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition duration-200"
        >
          Post
        </button>
      </form>
    </section>

    <!-- Posts List -->
    <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Example Post -->
      <article class="bg-white p-4 rounded-xl shadow-md">
        <img src="https://via.placeholder.com/400x200" alt="Post Thumbnail" class="rounded-md mb-4">
        <h3 class="text-lg font-bold mb-2">Example Post Title</h3>
        <p class="text-sm text-gray-700 mb-4">This is a short description of the post content.</p>
        <button class="text-blue-600 hover:underline">Read more</button>
      </article>

      <!-- Repeat more posts like this -->
      <article class="bg-white p-4 rounded-xl shadow-md">
        <img src="https://via.placeholder.com/400x200" alt="Post Thumbnail" class="rounded-md mb-4">
        <h3 class="text-lg font-bold mb-2">Another Post</h3>
        <p class="text-sm text-gray-700 mb-4">Here goes the content preview for another post.</p>
        <button class="text-blue-600 hover:underline">Read more</button>
      </article>
    </section>
  </main>
</body>
</html>

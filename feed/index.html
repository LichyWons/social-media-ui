<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed</title>
    <link href="../dist/output.css" rel="stylesheet" />
  </head>
  <body
    data-page="feed"
    class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 text-gray-800 font-sans"
  >
    <!-- Navigation -->
    <header
      class="bg-gradient-to-r from-red-500 via-gray-600 to-black shadow-xl border-b-4 border-black"
    >
      <div
        class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center"
      >
        <a href="/feed/index.html"
          ><h1
            class="text-3xl font-extrabold tracking-widest text-white drop-shadow-[2px_2px_0px_#000]"
          >
            LIFE Invader
          </h1></a
        >
        <nav>
          <!-- Burger menu button (mobile) -->
          <button
            id="menu-toggle"
            class="md:hidden text-white bg-red-500 border-2 border-black px-3 py-1 rounded hover:bg-red-400 transition"
          >
            ☰ Menu
          </button>

          <!-- Menu links -->
          <ul
            id="menu"
            class="hidden md:flex gap-6 text-lg font-bold text-white"
          >
            <li><a href="/feed/index.html" class="hover:underline">Feed</a></li>
            <li>
              <a href="/profile/index.html" class="hover:underline">Profile</a>
            </li>
            <li><a href="/index.html" class="hover:underline">Log out</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <!-- Popup menu (half width + scale animation) -->
    <div
      id="menu-overlay"
      class="fixed top-16 right-4 w-1/2 bg-white shadow-xl hidden z-40 rounded-xl border-2 border-black p-6 flex flex-col gap-4 transform scale-0 transition-transform duration-300 origin-top-right"
    >
      <a href="/feed/index.html" class="hover:underline text-black font-bold"
        >Feed</a
      >
      <a href="/profile/index.html" class="hover:underline text-black font-bold"
        >Profile</a
      >
      <a href="/index.html" class="hover:underline text-black font-bold"
        >Log out</a
      >
    </div>
    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto px-4 py-6">
      <!-- Search and Sort -->
      <div
        class="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-4"
      >
        <input
          id="search-input"
          type="search"
          placeholder="Search posts..."
          class="w-full md:w-1/2 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        <div class="flex gap-3">
          <select
            id="filter-select"
            class="px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option value="all">All posts</option>
            <option value="mine">My posts</option>
            <option value="with_media">With media</option>
          </select>
          <select
            id="sort-select"
            class="px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option value="date_desc">Newest</option>
            <option value="date_asc">Oldest</option>
          </select>
        </div>
      </div>

      <p id="feed-status" class="hidden mb-6 text-sm text-gray-700"></p>

      <!-- New Post Form -->
      <section class="bg-white p-6 rounded-xl shadow-md mb-8">
        <h2 class="text-lg font-bold mb-4">Create a New Post</h2>
        <form id="create-post-form" action="#" method="POST" class="space-y-4">
          <div>
            <label for="title" class="block text-sm font-medium text-gray-700"
              >Post Title</label
            >
            <input
              id="title"
              name="title"
              type="text"
              required
              class="mt-1 w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            />
          </div>
          <div>
            <label for="content" class="block text-sm font-medium text-gray-700"
              >Content</label
            >
            <textarea
              id="content"
              name="content"
              rows="3"
              required
              class="mt-1 w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
            ></textarea>
          </div>
          <button
            type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition duration-200"
          >
            Post
          </button>
        </form>
      </section>

      <!-- Posts List -->
      <section
        id="posts-container"
        class="grid grid-cols-1 md:grid-cols-2 gap-6"
      ></section>
    </main>
    <script type="module" src="../js/main.js"></script>
  </body>
</html>
